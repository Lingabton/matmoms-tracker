      <h1>Matmoms 2026 — Blev maten billigare efter momssänkningen?</h1>
      <p>Oberoende prisbevakning av matmomssänkningen i Sverige. Momsen på livsmedel sänks från 12% till 6% den 1 april 2026. Vi mäter dagligen om prissänkningen når konsumenterna hos ICA, Coop och Willys.</p>
      <h2>Om projektet</h2>
      <p>Matmoms bevakar 419 livsmedel i 33 butiker i 9 svenska städer. Data samlas in dagligen och visar hur stor andel av momssänkningen som genomslagit i konsumentpriserna.</p>
      <h2>Vanliga frågor</h2>
      <h3>Hur mycket billigare borde maten bli?</h3>
      <p>Med en momssänkning från 12% till 6% borde matpriserna sjunka med cirka 5,4%.</p>
      <h3>Vilka butiker bevakas?</h3>
      <p>ICA, Coop och Willys — 33 butiker i Stockholm, Göteborg, Malmö, Uppsala, Örebro, Linköping, Sundsvall, Umeå och Luleå.</p>
      <h3>Vad är genomslag?</h3>
      <p>Genomslag mäter hur stor andel av den förväntade prissänkningen som faktiskt når konsumenterna. 100% = full prissänkning, 0% = butiken behöll besparingen.</p>
