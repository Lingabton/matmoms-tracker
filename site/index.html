      <h1>Matmoms — Jämför matpriser hos ICA, Coop och Willys</h1>
      <p>Daglig prisjämförelse av matvaror hos Sveriges tre största dagligvarukedjor. Sök bland 419 livsmedel, bygg din varukorg och se vilken kedja som är billigast. 33 butiker i 9 svenska städer.</p>

      <h2>Så fungerar det</h2>
      <p>Matmoms samlar in priser dagligen från ICA, Coop och Willys i Stockholm, Göteborg, Malmö, Uppsala, Örebro, Linköping, Sundsvall, Umeå och Luleå. Priserna jämförs automatiskt och uppdateras varje morgon.</p>

      <h2>Vanliga frågor</h2>

      <h3>Var är maten billigast — ICA, Coop eller Willys?</h3>
      <p>Det varierar per produkt. I vår data ser vi att Willys ofta har lägst pris på basvaror som mjölk och smör, medan ICA och Coop ligger nära varandra. Prisskillnaden mellan kedjorna är typiskt 5–15% för samma produkt.</p>

      <h3>Hur fungerar prisjämförelsen?</h3>
      <p>Vi samlar in priser dagligen via kedjornas API:er. Du kan söka bland 419 varor, jämföra priser och bygga en varukorg för att se vilken butik som är billigast totalt. Alla priser uppdateras varje morgon.</p>

      <h3>Vad hände med momssänkningen?</h3>
      <p>Den 1 april 2026 sänktes matmomsen från 12% till 6%. Vi mäter löpande hur mycket av prissänkningen som nått konsumenterna. Se prishistoriken per produkt för att följa utvecklingen.</p>

      <h2>Datatillgång för journalister och forskare</h2>
      <p>Vi erbjuder fullständig produktdata med 419 varor, 33 butiker och dagliga prisobservationer. Format: CSV, JSON, API.</p>
